server:
  port: 9111

spring:
  main:
    banner-mode: "off"
  application:
    name: alibaba-nacos-support
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        register-enabled: true
      config:
        server-addr: ${spring.cloud.nacos.discovery.server-addr}
        file-extension: yml