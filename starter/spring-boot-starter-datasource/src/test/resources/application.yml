loncra:
  framework:
    datasource:
      enabled: true
      master:
        url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
        username: sa
        password:
        driver-class-name: org.h2.Driver
        # 可以配置 HikariCP 连接池参数
        # hikari:
        #   maximum-pool-size: 10
        #   minimum-idle: 5
      slaves:
        - url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
          username: sa
          password:
          driver-class-name: org.h2.Driver
        - url: jdbc:h2:mem:testdb;MODE=MYSQL;DB_CLOSE_DELAY=-1
          username: sa
          password:
          driver-class-name: org.h2.Driver

spring:
  sql:
    init:
      schema-locations: classpath:sql/schema.sql
      data-locations: classpath:sql/data.sql
      mode: always
